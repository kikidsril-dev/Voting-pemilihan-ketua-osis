<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pemilihan Ketua OSIS</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      color: #1f2937;
    }
    .card {
      width: min(760px, calc(100% - 32px));
      padding: 40px 36px;
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15,23,42,0.12);
      background: white;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 3vw, 3rem); }
    p { margin: 0 0 28px; font-size: 1.05rem; color: #4b5563; line-height: 1.7; }
    .links { display: grid; gap: 16px; }
    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: #2563eb;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .links a.secondary { background: #f59e0b; }
    .links a:hover { transform: translateY(-2px); }
  </style>
  <script>
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost:8000/index.html');
    }
  </script>
</head>
<body>
  <main class="card">
    <h1>Voting Ketua OSIS</h1>
    <p>Gunakan link berikut untuk membuka halaman voting dan operator. Upload folder ini ke layanan hosting statis agar bisa diakses semua orang.</p>
    <div class="links">
      <a href="voting-ketos.html">Buka Halaman Voting</a>
      <a class="secondary" href="operator-ketos.html">Buka Halaman Operator</a>
      <a href="daftar-akun.html" style="background: #10b981;">Daftar Akun Voting Pemilihan Ketua OSIS</a>
    </div>
  </main>
</body>
</html>
