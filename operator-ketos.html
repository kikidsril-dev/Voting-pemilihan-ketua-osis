<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halaman Operator Voting</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --accent: #f59e0b;
      --success: #16a34a;
      --shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: white; border-radius: 24px; padding: 28px; box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .hero h1 { margin: 0 0 8px; font-size: 1.8rem; }
    .hero p { margin: 0; opacity: 0.95; line-height: 1.6; }
    .panel, .results {
      background: var(--card); border-radius: 24px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: 600; }
    input, textarea { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 0.95rem; }
    input[type="file"] { padding: 8px; background: #f8fafc; }
    textarea { min-height: 90px; resize: vertical; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: none; background: var(--primary); color: white; padding: 10px 16px; border-radius: 999px; cursor: pointer; font-weight: 600;
    }
    .secondary { background: var(--accent); }
    .danger { background: #dc2626; }
    .result-card {
      border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 12px; background: #f8fafc;
    }
    .result-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 8px; }
    .bar { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 999px; }
    .winner { color: var(--success); font-weight: 700; }
    .photo-preview {
      width: 100%; aspect-ratio: 4 / 3; border-radius: 16px; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; margin-top: 4px;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .container { padding: 16px; }
    }
  </style>
  <script>
    if (window.location.protocol === 'file:') {
      const currentPath = window.location.pathname.split('/').pop() || 'index.html';
      window.location.replace(`http://localhost:8000/${currentPath}`);
    }
  </script>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Halaman Operator Voting</h1>
      <p>Atur kandidat, lihat hasil voting, dan pantau persentase suara serta pemenang sementara.</p>
    </section>

    <section class="panel">
      <h2>Pengaturan Kandidat</h2>
      <form id="candidateForm">
        <div class="grid">
          <div class="field">
            <label for="name1">Nama Kandidat 1</label>
            <input id="name1" name="name1" required />
            <label for="class1">Kelas / Info 1</label>
            <input id="class1" name="class1" required />
            <label for="vision1">Visi 1</label>
            <textarea id="vision1" name="vision1" required></textarea>
            <label for="photo1">Foto 1</label>
            <input id="photo1" name="photo1" type="file" accept="image/*" />
            <div class="photo-preview"><img id="photoPreview1" src="candidate-1.svg" alt="Preview foto 1" /></div>
          </div>
          <div class="field">
            <label for="name2">Nama Kandidat 2</label>
            <input id="name2" name="name2" required />
            <label for="class2">Kelas / Info 2</label>
            <input id="class2" name="class2" required />
            <label for="vision2">Visi 2</label>
            <textarea id="vision2" name="vision2" required></textarea>
            <label for="photo2">Foto 2</label>
            <input id="photo2" name="photo2" type="file" accept="image/*" />
            <div class="photo-preview"><img id="photoPreview2" src="candidate-2.svg" alt="Preview foto 2" /></div>
          </div>
          <div class="field">
            <label for="name3">Nama Kandidat 3</label>
            <input id="name3" name="name3" required />
            <label for="class3">Kelas / Info 3</label>
            <input id="class3" name="class3" required />
            <label for="vision3">Visi 3</label>
            <textarea id="vision3" name="vision3" required></textarea>
            <label for="photo3">Foto 3</label>
            <input id="photo3" name="photo3" type="file" accept="image/*" />
            <div class="photo-preview"><img id="photoPreview3" src="candidate-3.svg" alt="Preview foto 3" /></div>
          </div>
        </div>
        <div class="actions">
          <button type="submit">Simpan Data Kandidat</button>
          <button type="button" class="secondary" id="refreshBtn">Refresh Hasil</button>
          <button type="button" class="danger" id="resetBtn">Reset Suara</button>
        </div>
      </form>
    </section>

    <section class="results">
      <h2>Hasil Voting</h2>
      <div id="winnerBox" class="winner"></div>
      <div id="resultsList"></div>
    </section>
  </div>

  <script>
    const candidateStorageKey = 'ketos-candidates';
    const voteStorageKey = 'ketos-vote-state';
    const defaultCandidates = [
      { id: 1, name: 'Alya Putri', className: 'Kelas XI IPA 1', vision: 'Visi: menciptakan sekolah yang lebih aktif, bersih, dan penuh semangat kebersamaan.', label: 'Alya', photo: '/candidate-1.svg' },
      { id: 2, name: 'Raka Pratama', className: 'Kelas XI IPS 2', vision: 'Visi: memperkuat kegiatan siswa, literasi, dan inovasi dalam setiap program sekolah.', label: 'Raka', photo: '/candidate-2.svg' },
      { id: 3, name: 'Nia Ramadhani', className: 'Kelas XI IPA 2', vision: 'Visi: mengembangkan kegiatan sekolah yang lebih kreatif, disiplin, dan penuh partisipasi siswa.', label: 'Nia', photo: '/candidate-3.svg' }
    ];

    let candidates = JSON.parse(localStorage.getItem(candidateStorageKey) || 'null') || defaultCandidates;
    let state = JSON.parse(localStorage.getItem(voteStorageKey) || '{"votes":[0,0,0],"chosen":null}');

    function loadState() {
      candidates = JSON.parse(localStorage.getItem(candidateStorageKey) || 'null') || defaultCandidates;
      state = JSON.parse(localStorage.getItem(voteStorageKey) || '{"votes":[0,0,0],"chosen":null}');
      if (!Array.isArray(state.votes)) {
        state.votes = [0, 0, 0];
      }
      while (state.votes.length < candidates.length) {
        state.votes.push(0);
      }
      if (state.votes.length > candidates.length) {
        state.votes = state.votes.slice(0, candidates.length);
      }
    }

    function getPhotoSrc(photo, id) {
      if (!photo) return `/candidate-${id}.svg`;
      if (photo.startsWith('data:') || photo.startsWith('http://') || photo.startsWith('https://') || photo.startsWith('/')) {
        return photo;
      }
      return `/${photo}`;
    }

    function renderForm() {
      document.getElementById('name1').value = candidates[0]?.name || '';
      document.getElementById('class1').value = candidates[0]?.className || '';
      document.getElementById('vision1').value = candidates[0]?.vision || '';
      document.getElementById('photoPreview1').src = getPhotoSrc(candidates[0]?.photo, 1);
      document.getElementById('name2').value = candidates[1]?.name || '';
      document.getElementById('class2').value = candidates[1]?.className || '';
      document.getElementById('vision2').value = candidates[1]?.vision || '';
      document.getElementById('photoPreview2').src = getPhotoSrc(candidates[1]?.photo, 2);
      document.getElementById('name3').value = candidates[2]?.name || '';
      document.getElementById('class3').value = candidates[2]?.className || '';
      document.getElementById('vision3').value = candidates[2]?.vision || '';
      document.getElementById('photoPreview3').src = getPhotoSrc(candidates[2]?.photo, 3);
    }

    function renderResults() {
      const resultsList = document.getElementById('resultsList');
      const totalVotes = state.votes.reduce((sum, value) => sum + value, 0);
      const winnerIndex = state.votes.indexOf(Math.max(...state.votes));
      const winnerName = totalVotes > 0 && winnerIndex >= 0 ? candidates[winnerIndex]?.name || 'Belum ada' : 'Belum ada pemenang';

      document.getElementById('winnerBox').textContent = totalVotes > 0 ? `Pemenang sementara: ${winnerName}` : 'Belum ada pemenang';

      resultsList.innerHTML = candidates.map((candidate, index) => {
        const votes = state.votes[index] || 0;
        const percent = totalVotes > 0 ? ((votes / totalVotes) * 100).toFixed(1) : '0.0';
        return `
          <article class="result-card">
            <div class="result-head">
              <strong>${candidate.name}</strong>
              <span>${votes} suara • ${percent}%</span>
            </div>
            <div class="bar"><span style="width:${percent}%"></span></div>
          </article>
        `;
      }).join('');
    }

    async function readFileAsDataUrl(file) {
      if (!file) return '';

      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Gagal membaca file gambar'));
        reader.readAsDataURL(file);
      });

      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const maxSize = 800;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxSize) {
              height = Math.round((height * maxSize) / width);
              width = maxSize;
            }
          } else if (height > maxSize) {
            width = Math.round((width * maxSize) / height);
            height = maxSize;
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = () => reject(new Error('Gagal memproses gambar'));
        img.src = dataUrl;
      });
    }

    document.getElementById('candidateForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      let photo1 = '';
      let photo2 = '';
      let photo3 = '';

      try {
        photo1 = await readFileAsDataUrl(document.getElementById('photo1').files[0]);
        photo2 = await readFileAsDataUrl(document.getElementById('photo2').files[0]);
        photo3 = await readFileAsDataUrl(document.getElementById('photo3').files[0]);
      } catch (error) {
        alert('Gagal memproses foto. Coba pilih file gambar lain.');
        return;
      }

      const updatedCandidates = [
        { id: 1, name: document.getElementById('name1').value.trim(), className: document.getElementById('class1').value.trim(), vision: document.getElementById('vision1').value.trim(), label: 'Alya', photo: photo1 || getPhotoSrc(candidates[0]?.photo, 1) },
        { id: 2, name: document.getElementById('name2').value.trim(), className: document.getElementById('class2').value.trim(), vision: document.getElementById('vision2').value.trim(), label: 'Raka', photo: photo2 || getPhotoSrc(candidates[1]?.photo, 2) },
        { id: 3, name: document.getElementById('name3').value.trim(), className: document.getElementById('class3').value.trim(), vision: document.getElementById('vision3').value.trim(), label: 'Nia', photo: photo3 || getPhotoSrc(candidates[2]?.photo, 3) }
      ];

      try {
        localStorage.setItem(candidateStorageKey, JSON.stringify(updatedCandidates));
      } catch (error) {
        alert('Foto terlalu besar untuk disimpan di browser. Coba pilih gambar yang lebih kecil.');
        return;
      }

      candidates = updatedCandidates;
      renderForm();
      renderResults();
      alert('Data kandidat berhasil disimpan.');
    });

    document.getElementById('refreshBtn').addEventListener('click', function () {
      loadState();
      renderForm();
      renderResults();
    });

    document.getElementById('resetBtn').addEventListener('click', function () {
      localStorage.removeItem(voteStorageKey);
      loadState();
      renderForm();
      renderResults();
      alert('Semua suara berhasil direset.');
    });

    ['photo1','photo2','photo3'].forEach((id) => {
      document.getElementById(id).addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const previewId = `photoPreview${id.slice(-1)}`;
          document.getElementById(previewId).src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    });

    loadState();
    renderForm();
    renderResults();
  </script>
</body>
</html>
